[course]
id = "solana-rust-vscode-course"
title = "Solana Rust Client Course for VS Code"
description = "A compact Rust-first course and VS Code sidebar for learning Solana client-side basics."

[[exercise]]
id = "01_keypairs"
title = "Keypairs and addresses"
package = "exercise_01_keypairs"
needs_surfpool = false
lesson = "book/src/01-keypairs.md"
hints = [
    "Create a fresh wallet with the solana-keypair Keypair type.",
    "The account address comes from the Signer trait, so make sure Signer is in scope.",
    "Return the wallet's address directly; do not create a new keypair inside wallet_address.",
]
solution = """
pub fn new_wallet() -> Keypair {
    Keypair::new()
}

pub fn wallet_address(wallet: &Keypair) -> Address {
    wallet.pubkey()
}
"""

[[exercise]]
id = "02_airdrop_balance"
title = "Airdrops and balances through RPC"
package = "exercise_02_airdrop_balance"
needs_surfpool = true
surfpool_mode = "offline"
lesson = "book/src/02-airdrop-balance.md"
hints = [
    "Use RpcClient::request_airdrop with the recipient address and lamports.",
    "The airdrop returns a signature; confirm that signature before reading the balance.",
    "After confirmation, ask the same client for get_balance(recipient).",
]
solution = """
let signature = client.request_airdrop(recipient, lamports)?;
client.confirm_transaction(&signature)?;
let balance = client.get_balance(recipient)?;
Ok(balance)
"""

[[exercise]]
id = "03_send_sol"
title = "Send SOL between wallets"
package = "exercise_03_send_sol"
needs_surfpool = true
surfpool_mode = "offline"
lesson = "book/src/03-send-sol.md"
hints = [
    "Start with system_instruction::transfer(&payer.pubkey(), recipient, lamports).",
    "Fetch a recent blockhash from the RpcClient before creating the transaction.",
    "Sign with Transaction::new_signed_with_payer, then send_and_confirm_transaction and return the signature.",
]
solution = """
let transfer = system_instruction::transfer(&payer.pubkey(), recipient, lamports);
let recent_blockhash = client.get_latest_blockhash()?;
let transaction = Transaction::new_signed_with_payer(
    &[transfer],
    Some(&payer.pubkey()),
    &[payer],
    recent_blockhash,
);

let signature = client.send_and_confirm_transaction(&transaction)?;
Ok(signature)
"""

[[exercise]]
id = "04_token_metadata"
title = "Create an SPL token with metadata"
package = "exercise_04_token_metadata"
needs_surfpool = false
lesson = "book/src/04-token-metadata.md"
hints = [
    "The mint account is created with the System Program, but it is owned by TOKEN_2022_PROGRAM_ID.",
    "Initialize the metadata pointer before initializing the mint, and point the metadata address at the mint itself.",
    "Use the token metadata interface against TOKEN_2022_PROGRAM_ID to initialize name, symbol, URI, and then update the description field.",
]
solution = """
let create_mint = system_instruction::create_account(
    payer,
    mint,
    rent_lamports,
    mint_space,
    &TOKEN_2022_PROGRAM_ID,
);
let initialize_pointer = metadata_pointer_instruction::initialize(
    &TOKEN_2022_PROGRAM_ID,
    mint,
    Some(*payer),
    Some(*mint),
)?;
let initialize_mint = token_instruction::initialize_mint(
    &TOKEN_2022_PROGRAM_ID,
    mint,
    payer,
    Some(payer),
    config.decimals,
)?;
let initialize_metadata = token_metadata_instruction::initialize(
    &TOKEN_2022_PROGRAM_ID,
    mint,
    payer,
    mint,
    payer,
    config.name,
    config.symbol,
    config.uri,
);
let update_description = token_metadata_instruction::update_field(
    &TOKEN_2022_PROGRAM_ID,
    mint,
    payer,
    Field::Key(\"description\".to_string()),
    config.description,
);

Ok(vec![
    create_mint,
    initialize_pointer,
    initialize_mint,
    initialize_metadata,
    update_description,
])
"""

