[[exercise]]
id = "10_rpc_client_basics"
title = "RPC client basics"
package = "exercise_10_rpc_client_basics"
needs_surfpool = true
surfpool_mode = "offline"
lesson = "book/src/10-rpc-client-basics.md"
hints = [
    "Use RpcClient::new_with_commitment with CommitmentConfig::confirmed().",
    "RpcClient exposes url(), get_slot(), and get_version() helpers.",
    "Copy the values into the RpcStatus struct; do not invent placeholder status data.",
]
solution = """
pub fn confirmed_client(rpc_url: &str) -> RpcClient {
    RpcClient::new_with_commitment(rpc_url.to_string(), CommitmentConfig::confirmed())
}

pub fn fetch_rpc_status(client: &RpcClient) -> Result<RpcStatus> {
    let slot = client.get_slot()?;
    let version = client.get_version()?;

    Ok(RpcStatus {
        url: client.url(),
        slot,
        solana_core: version.solana_core,
    })
}
"""

[[exercise]]
id = "11_wallet_file"
title = "Load a wallet keypair file"
package = "exercise_11_wallet_file"
needs_surfpool = false
lesson = "book/src/11-wallet-file.md"
hints = [
    "Solana CLI keypair files are JSON arrays of 64 secret/public key bytes.",
    "Use solana_keypair::read_keypair_file instead of parsing the file yourself.",
    "Bring the Signer trait into scope to call pubkey() on the loaded keypair.",
]
solution = """
pub fn load_keypair_file(path: &Path) -> Result<Keypair> {
    solana_keypair::read_keypair_file(path)
        .map_err(|error| anyhow::anyhow!(\"failed to read keypair file: {error}\"))
}

pub fn wallet_address_from_file(path: &Path) -> Result<Address> {
    let wallet = load_keypair_file(path)?;
    Ok(wallet.pubkey())
}
"""

[[exercise]]
id = "12_account_info"
title = "Fetch and inspect account info"
package = "exercise_12_account_info"
needs_surfpool = true
surfpool_mode = "offline"
lesson = "book/src/12-account-info.md"
hints = [
    "Use get_account_with_commitment so the caller controls the consistency level.",
    "The RPC response wraps the account in response.value; missing accounts are None.",
    "The account object contains lamports, owner, executable, and data fields.",
]
solution = """
let account = client
    .get_account_with_commitment(address, commitment)?
    .value
    .context(\"account not found\")?;

Ok(AccountSnapshot {
    lamports: account.lamports,
    owner: account.owner,
    executable: account.executable,
    data_len: account.data.len(),
})
"""

[[exercise]]
id = "13_confirm_signature"
title = "Confirm a transaction signature"
package = "exercise_13_confirm_signature"
needs_surfpool = true
surfpool_mode = "offline"
lesson = "book/src/13-confirm-signature.md"
hints = [
    "request_airdrop returns a Signature, not a balance.",
    "Use confirm_transaction_with_commitment when the caller provides a commitment.",
    "Poll confirmation briefly; local RPC may not report the signature on the first read.",
]
solution = """
let signature = client.request_airdrop(recipient, lamports)?;

for _ in 0..20 {
    let confirmed = client
        .confirm_transaction_with_commitment(&signature, commitment)?
        .value;
    if confirmed {
        return Ok(signature);
    }
    std::thread::sleep(std::time::Duration::from_millis(100));
}

anyhow::bail!(\"transaction was not confirmed\")
"""

[[exercise]]
id = "14_rent_create_account"
title = "Create a rent-exempt account"
package = "exercise_14_rent_create_account"
needs_surfpool = true
surfpool_mode = "offline"
lesson = "book/src/14-rent-create-account.md"
hints = [
    "Ask RPC for get_minimum_balance_for_rent_exemption(space).",
    "Build a System Program create_account instruction owned by the requested owner.",
    "The new account keypair must sign along with the payer.",
]
solution = """
let rent_lamports = client.get_minimum_balance_for_rent_exemption(space)?;
let create_account = system_instruction::create_account(
    &payer.pubkey(),
    &new_account.pubkey(),
    rent_lamports,
    space as u64,
    owner,
);
let recent_blockhash = client.get_latest_blockhash()?;
let transaction = Transaction::new_signed_with_payer(
    &[create_account],
    Some(&payer.pubkey()),
    &[payer, new_account],
    recent_blockhash,
);

Ok(client.send_and_confirm_transaction(&transaction)?)
"""

[[exercise]]
id = "15_pda_derivation"
title = "Derive a PDA"
package = "exercise_15_pda_derivation"
needs_surfpool = false
lesson = "book/src/15-pda-derivation.md"
hints = [
    "Convert the index to bytes once with to_le_bytes so the seed lives long enough.",
    "Use the seeds b\"course\", label.as_bytes(), wallet.as_ref(), and the index bytes.",
    "Address::find_program_address returns both the PDA and the bump.",
]
solution = """
let index_bytes = index.to_le_bytes();
let (address, bump) = Address::find_program_address(
    &[b\"course\", label.as_bytes(), wallet.as_ref(), &index_bytes],
    program_id,
);

PdaResult { address, bump }
"""

[[exercise]]
id = "16_simulate_transaction"
title = "Simulate before sending"
package = "exercise_16_simulate_transaction"
needs_surfpool = true
surfpool_mode = "offline"
lesson = "book/src/16-simulate-transaction.md"
hints = [
    "Build the same System Program transfer instruction you would send for real.",
    "Simulation still needs a recent blockhash and a signed transaction shape.",
    "Use client.simulate_transaction and summarize err, logs, and units_consumed.",
]
solution = """
let transfer = system_instruction::transfer(&payer.pubkey(), recipient, lamports);
let recent_blockhash = client.get_latest_blockhash()?;
let transaction = Transaction::new_signed_with_payer(
    &[transfer],
    Some(&payer.pubkey()),
    &[payer],
    recent_blockhash,
);
let result = client.simulate_transaction(&transaction)?.value;

Ok(SimulationSummary {
    ok: result.err.is_none(),
    logs: result.logs.unwrap_or_default(),
    units_consumed: result.units_consumed,
})
"""
